    <script>
        const BOOKING_API_BASE = "https://your-backend-booking-url/api/booking";
        const PREFERRED_SEAT_PRICE = 500;

        let PICKUP_OPTIONS = [];
        let calendarData = {};
        let toursData = {};

        const cache = {
            lineUserId: null,
            date: null,
            tourId: null,
            tourTitle: null,
            pricePerPerson: 0,
            userInfo: {},
            passengers: 1,
            pickups: [],
            preferredSeats: [],
            isSubmitting: false
        };

        // カレンダー表示用の年月管理
        let currentCalendarYear = new Date().getFullYear();
        let currentCalendarMonth = new Date().getMonth();

        document.addEventListener('DOMContentLoaded', async () => {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById('screen-b01').classList.add('active');
            
            try {
                const liffId = "YOUR_LIFF_ID";
                await liff.init({ liffId });
                
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    cache.lineUserId = profile.userId;
                    console.log("LIFF initialized:", cache.lineUserId);
                    await loadUserProfile();
                } else {
                    liff.login();
                }
            } catch (err) {
                console.error("LIFF init error:", err);
            }
            
            await Promise.all([
                loadCalendarData(),
                loadPickupOptions()
            ]);
        });

        async function loadCalendarData() {
            try {
                const response = await fetch(`${BOOKING_API_BASE}/calendar`);
                if (response.ok) {
                    const data = await response.json();
                    calendarData = {};
                    (data.dates || []).forEach(d => {
                        calendarData[d] = true;
                    });
                    renderCalendar();
                }
            } catch (err) {
                console.error("Failed to load calendar:", err);
            }
        }

        async function loadToursForDate(dateStr) {
            try {
                const response = await fetch(`${BOOKING_API_BASE}/tours?date=${dateStr}`);
                if (response.ok) {
                    const tours = await response.json();
                    toursData = {};
                    tours.forEach(t => {
                        toursData[t.id] = t;
                    });
                    renderTourList(dateStr);
                }
            } catch (err) {
                console.error("Failed to load tours:", err);
            }
        }

        async function loadPickupOptions() {
            try {
                const response = await fetch(`${BOOKING_API_BASE}/pickups`);
                if (response.ok) {
                    const pickups = await response.json();
                    // APIからは { id, name, sortOrder } 形式で取得
                    PICKUP_OPTIONS = pickups.map(p => ({
                        id: p.id,
                        name: p.name,
                        sortOrder: p.sortOrder || 0
                    }));
                }
            } catch (err) {
                console.error("Failed to load pickups:", err);
                // デフォルト値（sortOrder付き）
                PICKUP_OPTIONS = [
                    { id: "pickup-001", name: "新宿駅 西口", sortOrder: 1 },
                    { id: "pickup-002", name: "東京駅 丸の内北口", sortOrder: 2 },
                    { id: "pickup-003", name: "横浜駅 東口", sortOrder: 3 }
                ];
            }
        }

        async function loadUserProfile() {
            if (!cache.lineUserId) return;
            try {
                const response = await fetch(`${BOOKING_API_BASE}/profile?lineUserId=${cache.lineUserId}`);
                if (response.ok) {
                    const profile = await response.json();
                    if (profile && Object.keys(profile).length > 0) {
                        localStorage.setItem('user_profile_cache', JSON.stringify(profile));
                    }
                }
            } catch (err) {
                console.error("Failed to load profile:", err);
            }
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            const year = currentCalendarYear;
            const month = currentCalendarMonth;
            
            document.getElementById('calendar-month-title').innerText = `${year}年 ${month + 1}月`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            
            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'h-14 lg:h-20';
                grid.appendChild(empty);
            }
            
            for (let d = 1; d <= lastDate; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isAvailable = calendarData[dateStr];
                
                if (isAvailable) {
                    const btn = document.createElement('button');
                    btn.className = 'h-14 lg:h-20 bg-white border-2 lg:border-3 border-primary text-black font-bold flex items-center justify-center rounded lg:rounded-lg shadow-sm hover:bg-yellow-50 lg:text-2xl transition-colors';
                    btn.innerText = d;
                    btn.onclick = () => selectDate(dateStr);
                    grid.appendChild(btn);
                } else {
                    const div = document.createElement('div');
                    div.className = 'h-14 lg:h-20 bg-gray-100 text-gray-400 flex items-center justify-center rounded lg:rounded-lg lg:text-2xl';
                    div.innerText = d;
                    grid.appendChild(div);
                }
            }
        }

        function changeMonth(delta) {
            currentCalendarMonth += delta;
            if (currentCalendarMonth > 11) {
                currentCalendarMonth = 0;
                currentCalendarYear++;
            } else if (currentCalendarMonth < 0) {
                currentCalendarMonth = 11;
                currentCalendarYear--;
            }
            renderCalendar();
        }

        function renderTourList(dateStr) {
            const container = document.getElementById('tour-list');
            container.innerHTML = '';
            
            const tours = Object.values(toursData);
            
            if (tours.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-8">この日のツアーはありません</div>';
                return;
            }
            
            tours.forEach(tour => {
                const card = document.createElement('div');
                card.className = 'border rounded-xl overflow-hidden shadow-md lg:shadow-lg';
                
                const isFull = tour.remainingSeats <= 0 || tour.status === 'full';
                const statusBadge = isFull 
                    ? '<span class="absolute top-2 right-2 lg:top-4 lg:right-4 bg-red-500 text-white px-2 py-1 lg:px-4 lg:py-2 rounded text-sm lg:text-lg font-bold">満席</span>' 
                    : '';
                
                const escapedTitle = tour.title.replace(/'/g, "\\'");
                
                card.innerHTML = `
                    <div class="relative">
                        ${tour.imageUrl 
                            ? `<img src="${tour.imageUrl}" alt="${tour.title}" class="w-full h-48 lg:h-64 object-cover">` 
                            : '<div class="bg-gray-300 h-48 lg:h-64 w-full flex items-center justify-center text-gray-500 font-bold lg:text-xl">ツアー画像</div>'}
                        ${statusBadge}
                    </div>
                    <div class="p-4 lg:p-6">
                        <h3 class="text-xl lg:text-2xl font-bold mb-2 lg:mb-3">${tour.title}</h3>
                        <p class="text-gray-700 mb-2 lg:mb-3 text-lg lg:text-xl">${tour.description || ''}</p>
                        <p class="text-sm lg:text-lg text-gray-500 mb-4 lg:mb-6">残り ${tour.remainingSeats}席</p>
                        <div class="flex justify-between items-end">
                            <span class="text-2xl lg:text-3xl font-bold">¥${tour.price.toLocaleString()}</span>
                            ${isFull 
                                ? '<span class="bg-gray-300 text-gray-500 font-bold py-3 px-8 lg:py-4 lg:px-10 rounded-lg text-lg lg:text-xl">満席</span>'
                                : `<button onclick="selectTour('${tour.id}', '${escapedTitle}', ${tour.price})" class="bg-primary hover:bg-primary-hover text-black font-bold py-3 px-8 lg:py-4 lg:px-10 rounded-lg text-lg lg:text-xl shadow-md border-b-4 border-yellow-500 active:border-b-0 active:translate-y-1 transition-colors">選択する</button>`
                            }
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function goTo(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            window.scrollTo(0, 0);
        }

        async function selectDate(dateStr) {
            cache.date = dateStr;
            const [y, m, d] = dateStr.split('-');
            document.getElementById('view-date-title').innerText = `${parseInt(m)}月${parseInt(d)}日のツアー`;
            
            document.getElementById('tour-list').innerHTML = '<div class="text-center text-gray-400 py-8">読み込み中...</div>';
            goTo('screen-b02');
            await loadToursForDate(dateStr);
        }

        // ---------------------------------
        // 自動入力キャッシュチェック（自動ダイアログ表示）
        // ---------------------------------
        function checkAutoFillCache() {
            const saved = localStorage.getItem('user_profile_cache');
            
            if (saved) {
                // キャッシュがある場合：自動でダイアログ表示
                showAutoFillDialog();
            }
            // キャッシュがない場合：何もしない
        }

        function selectTour(tourId, title, price) {
            cache.tourId = tourId;
            cache.tourTitle = title;
            cache.pricePerPerson = price;
            cache.passengers = parseInt(document.getElementById('input-passengers').value) || 1;
            setupPreferredSeatsUI();
            goTo('screen-b03');
            
            // キャッシュがあれば自動でダイアログ表示
            checkAutoFillCache();
        }

        // ---------------------------------
        // B-03 自動入力ダイアログ（ポップアップ形式）
        // ---------------------------------
        function showAutoFillDialog() {
            const saved = localStorage.getItem('user_profile_cache');
            if (!saved) return;
            
            const data = JSON.parse(saved);
            
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4';
            modal.id = 'auto-fill-modal';
            modal.style.animation = 'fadeIn 0.2s ease-out';
            
            modal.innerHTML = `
                <style>
                    @keyframes fadeIn {
                        from { opacity: 0; }
                        to { opacity: 1; }
                    }
                    @keyframes slideUp {
                        from { opacity: 0; transform: translateY(20px) scale(0.95); }
                        to { opacity: 1; transform: translateY(0) scale(1); }
                    }
                    @keyframes slideOut {
                        from { opacity: 1; transform: translateY(0) scale(1); }
                        to { opacity: 0; transform: translateY(20px) scale(0.95); }
                    }
                    .popup-content {
                        animation: slideUp 0.3s ease-out;
                    }
                    .popup-closing {
                        animation: slideOut 0.2s ease-in forwards;
                    }
                </style>
                <div class="popup-content bg-white rounded-2xl max-w-sm w-full shadow-2xl overflow-hidden" onclick="event.stopPropagation()">
                    <div class="bg-blue-500 text-white p-4 text-center">
                        <div class="text-3xl mb-1">📋</div>
                        <h3 class="text-xl font-bold">前回の情報を使用しますか？</h3>
                    </div>
                    <div class="p-5">
                        <div class="bg-gray-50 p-4 rounded-xl space-y-3 mb-5 border border-gray-200">
                            <div class="flex items-start gap-3">
                                <span class="text-gray-400 text-lg">👤</span>
                                <div class="flex-1">
                                    <p class="text-xs text-gray-500 mb-0.5">お名前</p>
                                    <p class="font-bold text-base">${data.name || "---"}</p>
                                </div>
                            </div>
                            <div class="border-t border-gray-200"></div>
                            <div class="flex items-start gap-3">
                                <span class="text-gray-400 text-lg">📞</span>
                                <div class="flex-1">
                                    <p class="text-xs text-gray-500 mb-0.5">電話番号</p>
                                    <p class="font-bold text-base">${data.phone || "---"}</p>
                                </div>
                            </div>
                            <div class="border-t border-gray-200"></div>
                            <div class="flex items-start gap-3">
                                <span class="text-gray-400 text-lg">🏠</span>
                                <div class="flex-1">
                                    <p class="text-xs text-gray-500 mb-0.5">ご住所</p>
                                    <p class="font-bold text-sm leading-relaxed">${data.pref || ""}${data.city || ""}${data.street || ""}</p>
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="closeAutoFillDialog()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3.5 rounded-xl text-lg transition-colors">いいえ</button>
                            <button onclick="applyAutoFill()" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-bold py-3.5 rounded-xl text-lg transition-colors shadow-md">はい</button>
                        </div>
                    </div>
                </div>
            `;
            
            modal.onclick = (e) => {
                if (e.target === modal) {
                    closeAutoFillDialog();
                }
            };
            
            document.body.appendChild(modal);
            window.autoFillData = data;
        }
        
        function closeAutoFillDialog() {
            const modal = document.getElementById('auto-fill-modal');
            if (modal) {
                const content = modal.querySelector('.popup-content');
                if (content) {
                    content.classList.add('popup-closing');
                    setTimeout(() => modal.remove(), 200);
                } else {
                    modal.remove();
                }
            }
        }
        
        function applyAutoFill() {
            const data = window.autoFillData;
            document.getElementById('input-name').value = data.name || "";
            document.getElementById('input-phone').value = data.phone || "";
            document.getElementById('input-zip').value = data.zip || "";
            document.getElementById('input-pref').value = data.pref || "";
            document.getElementById('input-city').value = data.city || "";
            document.getElementById('input-street').value = data.street || "";
            closeAutoFillDialog();
        }

        function submitUserInfo() {
            cache.userInfo = {
                name: document.getElementById('input-name').value,
                phone: document.getElementById('input-phone').value,
                zip: document.getElementById('input-zip').value,
                pref: document.getElementById('input-pref').value,
                city: document.getElementById('input-city').value,
                street: document.getElementById('input-street').value
            };
            cache.passengers = parseInt(document.getElementById('input-passengers').value);

            const seatCheckbox = document.getElementById('preferred-seat-all');
            const allSeats = seatCheckbox && seatCheckbox.checked;
            cache.preferredSeats = Array(cache.passengers).fill(allSeats);

            const consent = document.getElementById('consent-next').checked;
            if (consent) {
                localStorage.setItem('user_profile_cache', JSON.stringify(cache.userInfo));
            }

            setupPickupScreen();
            goTo('screen-b04');
        }

        function setupPreferredSeatsUI() {
            const area = document.getElementById('preferred-seats-area');
            area.innerHTML = '';

            const container = document.createElement('div');
            container.className = "p-4 lg:p-6 bg-gray-50 rounded-lg border border-gray-200";

            const label = document.createElement('label');
            label.className = "flex items-center p-3 lg:p-4 bg-white border rounded-lg cursor-pointer hover:bg-gray-50 transition";
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = 'preferred-seat-all';
            checkbox.className = 'w-5 h-5 lg:w-7 lg:h-7 text-primary border-gray-300 rounded';
            
            const labelText = document.createElement('span');
            labelText.className = 'ml-3 lg:ml-4 text-lg lg:text-2xl font-bold';
            labelText.innerText = `前列座席を希望する（全員分 +¥${(PREFERRED_SEAT_PRICE * cache.passengers).toLocaleString()}）`;
            
            label.appendChild(checkbox);
            label.appendChild(labelText);
            container.appendChild(label);

            area.appendChild(container);
        }
        
        function updatePreferredSeatsUI() {
            setupPreferredSeatsUI();
        }

        function setupPickupScreen() {
            document.getElementById('pickup-count-label').innerText = `参加人数：${cache.passengers}名`;
            
            const modeSelector = document.getElementById('pickup-mode-selector');
            
            // 2名以上の場合は選択肢を表示
            if (cache.passengers >= 2) {
                modeSelector.classList.remove('hidden');
                modeSelector.classList.add('flex');
            } else {
                modeSelector.classList.add('hidden');
                modeSelector.classList.remove('flex');
            }
            
            // デフォルトは「全員同じ」
            document.querySelector('input[name="pickup_mode"][value="same"]').checked = true;
            
            renderPickupDropdowns();
        }

        function renderPickupDropdowns() {
            const area = document.getElementById('pickup-dropdowns-area');
            area.innerHTML = '';
            
            const mode = document.querySelector('input[name="pickup_mode"]:checked').value;
            const count = (mode === 'individual') ? cache.passengers : 1;
            
            // 選択中のツアーに対応する乗車地を取得（sortOrderでソート）
            const tour = toursData[cache.tourId];
            const availablePickupIds = tour?.pickupIds || [];
            
            // pickupIdsが設定されていればフィルタ、なければ全て表示
            let availablePickups;
            if (availablePickupIds.length > 0) {
                availablePickups = PICKUP_OPTIONS
                    .filter(p => availablePickupIds.includes(p.id))
                    .sort((a, b) => a.sortOrder - b.sortOrder);
            } else {
                availablePickups = [...PICKUP_OPTIONS].sort((a, b) => a.sortOrder - b.sortOrder);
            }
            
            for (let i = 0; i < count; i++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'mb-4';
                
                const label = document.createElement('label');
                label.className = "block text-lg lg:text-2xl font-bold mb-2 lg:mb-3";
                label.innerText = (count === 1) ? "乗車場所を選択" : `${i + 1}人目の乗車場所`;
                wrapper.appendChild(label);

                const select = document.createElement('select');
                select.className = "pickup-select w-full border-2 border-gray-300 p-3 lg:p-4 rounded-lg bg-white text-lg lg:text-2xl h-14 lg:h-16";
                
                availablePickups.forEach(pickup => {
                    const option = document.createElement('option');
                    option.value = pickup.name;
                    option.innerText = pickup.name;
                    select.appendChild(option);
                });

                wrapper.appendChild(select);
                area.appendChild(wrapper);
            }
        }

        function submitPickups() {
            const selects = document.querySelectorAll('.pickup-select');
            cache.pickups = Array.from(selects).map(s => s.value);
            
            setupConfirmScreen();
            goTo('screen-b05');
        }

        function formatDateJP(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return `${y}年${parseInt(m)}月${parseInt(d)}日`;
        }

        function setupConfirmScreen() {
            document.getElementById('conf-tour').innerText = cache.tourTitle;
            document.getElementById('conf-date').innerText = formatDateJP(cache.date);
            document.getElementById('conf-name').innerText = cache.userInfo.name + " 様";
            document.getElementById('conf-phone').innerText = cache.userInfo.phone;
            const address = (cache.userInfo.pref || '') + (cache.userInfo.city || '') + (cache.userInfo.street || '');
            document.getElementById('conf-address').innerText = address || '未入力';
            document.getElementById('conf-passengers').innerText = cache.passengers + "名";
            
            const baseTour = cache.pricePerPerson * cache.passengers;
            const seatUpchargeCount = cache.preferredSeats.filter(s => s).length;
            const seatUpcharge = seatUpchargeCount * PREFERRED_SEAT_PRICE;
            const total = baseTour + seatUpcharge;
            
            document.getElementById('conf-base-price').innerText = "¥" + baseTour.toLocaleString();
            document.getElementById('conf-seat-price').innerText = "¥" + seatUpcharge.toLocaleString();
            document.getElementById('conf-total').innerText = "¥" + total.toLocaleString();

            const pickupContainer = document.getElementById('conf-pickups');
            pickupContainer.innerHTML = '';
            
            // 乗車場所の表示（全員同じ or 個別）
            if (cache.pickups.length === 1 || cache.pickups.every(p => p === cache.pickups[0])) {
                pickupContainer.innerText = cache.pickups[0];
            } else {
                cache.pickups.forEach((pickup, idx) => {
                    const p = document.createElement('p');
                    p.innerText = `${idx + 1}人目：${pickup}`;
                    pickupContainer.appendChild(p);
                });
            }

            const seatContainer = document.getElementById('conf-seats');
            seatContainer.innerHTML = '';
            const seatList = [];
            cache.preferredSeats.forEach((isSeat, idx) => {
                if (isSeat) {
                    seatList.push(`${idx+1}人目`);
                }
            });
            if (seatList.length > 0) {
                seatContainer.innerText = seatList.join("、") + "が前列座席指定";
            } else {
                seatContainer.innerText = "座席指定なし";
            }
        }

        // ---------------------------------
        // B-06 完了画面を動的に生成
        // ---------------------------------
        function createCompletionScreen() {
            // 既存のB-06画面があれば削除
            const existing = document.getElementById('screen-b06');
            if (existing) {
                existing.remove();
            }
            
            // 新しいB-06画面を作成
            const screen = document.createElement('div');
            screen.id = 'screen-b06';
            screen.className = 'screen p-8 text-center flex flex-col justify-center min-h-[60vh]';
            screen.innerHTML = `
                <div class="text-6xl mb-6">✅</div>
                <h2 class="text-2xl font-bold mb-8">予約を受け付けました</h2>
                
                <div class="bg-blue-50 border-2 border-blue-100 p-6 rounded-xl text-left w-full mb-6 space-y-4">
                    <p class="text-base leading-relaxed">
                        弊社が確認後、LINEにて、予約確定通知をお送りいたします。担当者からの連絡をお待ちください。
                    </p>
                    <p class="text-base leading-relaxed">
                        2営業日（土日祝休）を経過してもご連絡がない場合は、お申込みが届いていない可能性がございます。その際はお手数ですがご一報ください。
                    </p>
                    <p class="text-base leading-relaxed">
                        乗車地「六之本・米原・彦根」は他のお客様を含めて5名以上のお申込みがない場合、変更をお願いする場合がございます。
                    </p>
                    <p class="text-base leading-relaxed font-bold text-red-600">
                        キャンセルは公式LINEからご連絡ください。
                    </p>
                </div>

                <p class="text-xl font-bold text-gray-800">
                    この画面は閉じても大丈夫です。
                </p>
            `;
            
            // DOMに追加（screen-b05の親要素を取得）
            const container = document.getElementById('screen-b05').parentElement;
            container.appendChild(screen);
        }

        async function submitReservation() {
            if (cache.isSubmitting) {
                alert("送信中です。お待ちください...");
                return;
            }

            cache.isSubmitting = true;
            const btn = document.getElementById('btn-confirm-reservation');
            btn.disabled = true;
            btn.innerText = "読み込み中…";

            try {
                const payload = {
                    lineUserId: cache.lineUserId,
                    date: cache.date,
                    tourId: cache.tourId,
                    tourTitle: cache.tourTitle,
                    pricePerPerson: cache.pricePerPerson,
                    userInfo: cache.userInfo,
                    passengers: cache.passengers,
                    pickups: cache.pickups,
                    preferredSeats: cache.preferredSeats,
                    consentAutoFill: document.getElementById('consent-next').checked
                };

                const response = await fetch(`${BOOKING_API_BASE}/reservations`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const data = await response.json();
                    console.log("Reservation success:", data);
                    createCompletionScreen();
                    goTo('screen-b06');
                } else {
                    const error = await response.json();
                    alert("予約エラー: " + (error.message || "予約できませんでした"));
                }
            } catch (err) {
                console.error("API error:", err);
                alert("通信エラーが発生しました");
            } finally {
                cache.isSubmitting = false;
                btn.disabled = false;
                btn.innerText = "予約を確定する";
            }
        }
    </script>
</body>
</html>
