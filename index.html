    <script>
        const BOOKING_API_BASE = "https://backend-booking-482800127304.asia-northeast1.run.app/api/booking";
        const PREFERRED_SEAT_PRICE = 500;

        let PICKUP_OPTIONS = [];
        let calendarData = {};
        let toursData = {};

        function getDefaultPickups() {
            return [
                { id: "pickup-001", name: "新宿駅 西口", sortOrder: 1 },
                { id: "pickup-002", name: "東京駅 丸の内北口", sortOrder: 2 },
                { id: "pickup-003", name: "横浜駅 東口", sortOrder: 3 }
            ];
        }

        function getCurrentMonthString() {
            return `${currentCalendarYear}-${String(currentCalendarMonth + 1).padStart(2, '0')}`;
        }

        const cache = {
            lineUserId: null,
            date: null,
            tourId: null,
            tourTitle: null,
            pricePerPerson: 0,
            userInfo: {},
            passengers: 1,
            pickups: [],
            preferredSeats: [],
            isSubmitting: false,
            isWaitlist: false
        };

        // カレンダー表示用の年月管理
        let currentCalendarYear = new Date().getFullYear();
        let currentCalendarMonth = new Date().getMonth();

        // LIFF状態管理
        let liffReady = false;
        let liffAccessToken = null;

        document.addEventListener('DOMContentLoaded', async () => {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById('screen-b01').classList.add('active');
            
            try {
                if (typeof window.liff !== 'undefined') {
                    const liffId = "2009323831-cfxQtdaY";
                    await liff.init({ liffId });
                    
                    const isLoggedIn = liff.isLoggedIn();
                    const isInClient = liff.isInClient();
                    const os = liff.getOS();
                    console.log("LIFF init OK. isLoggedIn:", isLoggedIn, "isInClient:", isInClient, "OS:", os);

                    if (!isLoggedIn) {
                        console.log("Not logged in, redirecting to login...");
                        liff.login();
                        return; // login後リダイレクトされるのでここで停止
                    }

                    // ログイン済み → アクセストークン保存（これは確実に取れる）
                    liffAccessToken = liff.getAccessToken();
                    console.log("Access token obtained:", !!liffAccessToken);

                    // userId取得を試行（取れなくてもOK、アクセストークンがある）
                    try {
                        const profile = await liff.getProfile();
                        if (profile && profile.userId) {
                            cache.lineUserId = profile.userId;
                            console.log("Got userId from getProfile:", cache.lineUserId);
                        }
                    } catch (profileErr) {
                        console.warn("getProfile失敗（アクセストークンを使用）:", profileErr.message);
                    }

                    // getProfileで取れなかった場合、他の方法を試す
                    if (!cache.lineUserId) {
                        try {
                            const ctx = liff.getContext();
                            if (ctx && ctx.userId) {
                                cache.lineUserId = ctx.userId;
                                console.log("Got userId from getContext:", cache.lineUserId);
                            }
                        } catch (e) { /* ignore */ }
                    }
                    if (!cache.lineUserId) {
                        try {
                            const decoded = liff.getDecodedIDToken();
                            if (decoded && decoded.sub) {
                                cache.lineUserId = decoded.sub;
                                console.log("Got userId from IDToken:", cache.lineUserId);
                            }
                        } catch (e) { /* ignore */ }
                    }

                    liffReady = true;
                    console.log("LIFF ready. userId:", cache.lineUserId, "hasAccessToken:", !!liffAccessToken);
                    
                    await loadUserProfile();
                } else {
                    console.warn("LIFF SDKが読み込まれていません。LIFFなしで続行します。");
                }
            } catch (err) {
                console.error("LIFF初期化エラー:", err);
                // LIFFエラーでもアクセストークンがあれば使える
                try {
                    if (typeof liff !== 'undefined' && liff.isLoggedIn()) {
                        liffAccessToken = liff.getAccessToken();
                        liffReady = true;
                    }
                } catch (e) { /* ignore */ }
            }
            
            await Promise.all([
                loadCalendarData(getCurrentMonthString()),
                loadPickupOptions()
            ]);
        });

        async function resolveLineUserId() {
            const debugInfo = [];

            // 1) liff.getContext() — スコープ不要
            try {
                const ctx = liff.getContext();
                debugInfo.push('context: ' + JSON.stringify(ctx));
                if (ctx && ctx.userId) {
                    console.log('Got userId from getContext');
                    return ctx.userId;
                }
            } catch (err) {
                debugInfo.push('context err: ' + err.message);
            }

            // 2) liff.getProfile() — profile スコープ必要
            try {
                const profile = await liff.getProfile();
                debugInfo.push('profile: ' + JSON.stringify({userId: profile?.userId, displayName: profile?.displayName}));
                if (profile && profile.userId) {
                    return profile.userId;
                }
            } catch (err) {
                debugInfo.push('profile err: ' + err.message);
            }

            // 3) liff.getDecodedIDToken() — openid スコープ必要
            try {
                const decoded = liff.getDecodedIDToken();
                debugInfo.push('idToken: ' + JSON.stringify({sub: decoded?.sub}));
                if (decoded && decoded.sub) {
                    return decoded.sub;
                }
            } catch (err) {
                debugInfo.push('idToken err: ' + err.message);
            }

            // 4) liff.getIDToken() を手動デコード
            try {
                const raw = liff.getIDToken();
                if (raw) {
                    const payload = JSON.parse(atob(raw.split('.')[1]));
                    debugInfo.push('rawToken sub: ' + payload.sub);
                    if (payload.sub) return payload.sub;
                }
            } catch (err) {
                debugInfo.push('rawToken err: ' + err.message);
            }

            // 全て失敗 → デバッグ情報をコンソール＆画面表示
            console.error('ユーザーID取得全方法失敗:', debugInfo);
            window._liffDebug = debugInfo;
            return null;
        }

        async function loadCalendarData(month) {
            try {
                const targetMonth = month || getCurrentMonthString();
                const response = await fetch(`${BOOKING_API_BASE}/calendar?month=${encodeURIComponent(targetMonth)}`);
                if (response.ok) {
                    const data = await response.json();
                    calendarData = {};
                    Object.entries(data || {}).forEach(([dateStr, info]) => {
                        calendarData[dateStr] = !!(info && info.available);
                    });
                    renderCalendar();
                } else {
                    const grid = document.getElementById('calendar-grid');
                    if (grid) {
                        grid.innerHTML = '<div class="h-14 flex items-center justify-center text-red-500">カレンダーの読み込みに失敗しました</div>';
                    }
                }
            } catch (err) {
                console.error("カレンダー読み込み失敗:", err);
                const grid = document.getElementById('calendar-grid');
                if (grid) {
                    grid.innerHTML = '<div class="h-14 flex items-center justify-center text-red-500">カレンダーの読み込みに失敗しました</div>';
                }
            }
        }

        async function loadToursForDate(dateStr) {
            try {
                const response = await fetch(`${BOOKING_API_BASE}/tours?date=${dateStr}`);
                if (response.ok) {
                    const tours = await response.json();
                    toursData = {};
                    tours.forEach(t => {
                        const normalizedTour = {
                            ...t,
                            imageUrl: t.imageUrl || t.image_url || '',
                            remainingSeats: Math.max((t.capacity || 0) - (t.current_count || 0), 0),
                            pickupIds: Array.isArray(t.pickupIds) ? t.pickupIds : [],
                            waitlist_count: t.waitlist_count || 0,
                            waitlist_max: t.waitlist_max || 3,
                            waitlist_available: t.waitlist_available || false
                        };
                        toursData[t.id] = normalizedTour;
                    });
                    renderTourList(dateStr);
                }
            } catch (err) {
                console.error("ツアー情報読み込み失敗:", err);
                const tourList = document.getElementById('tour-list');
                if (tourList) {
                    tourList.innerHTML = '<div class="text-center text-red-500 py-4">ツアー情報の取得に失敗しました</div>';
                }
            }
        }

        async function loadPickupOptions() {
            try {
                const response = await fetch(`${BOOKING_API_BASE}/pickups`);
                if (response.ok) {
                    const pickups = await response.json();
                    // APIからは { id, name, sortOrder } 形式で取得
                    PICKUP_OPTIONS = pickups.map(p => ({
                        id: p.id,
                        name: p.name,
                        sortOrder: p.sortOrder || 0
                    }));
                } else {
                    console.error("乗車地情報読み込み失敗:", response.status);
                    PICKUP_OPTIONS = getDefaultPickups();
                }
            } catch (err) {
                console.error("乗車地情報読み込み失敗:", err);
                PICKUP_OPTIONS = getDefaultPickups();
            }
        }

        async function searchAddressByZip() {
            const zipInput = document.getElementById('input-zip');
            const button = document.getElementById('btn-zip-search');
            const zip = (zipInput.value || '').replace(/[^0-9]/g, '');

            if (zip.length !== 7) {
                alert('郵便番号は7桁で入力してください');
                return;
            }

            try {
                button.disabled = true;
                button.innerText = '検索中...';

                const response = await fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${zip}`);
                if (!response.ok) {
                    alert('住所検索に失敗しました');
                    return;
                }

                const data = await response.json();
                if (!data || !data.results || data.results.length === 0) {
                    alert('該当する住所が見つかりませんでした');
                    return;
                }

                const result = data.results[0];
                document.getElementById('input-pref').value = result.address1 || '';
                document.getElementById('input-city').value = `${result.address2 || ''}${result.address3 || ''}`;
                document.getElementById('input-street').focus();
            } catch (err) {
                console.error('郵便番号検索失敗:', err);
                alert('住所検索に失敗しました');
            } finally {
                button.disabled = false;
                button.innerText = '住所検索';
            }
        }

        async function loadUserProfile() {
            if (!cache.lineUserId) return;
            try {
                const response = await fetch(`${BOOKING_API_BASE}/profile?lineUserId=${cache.lineUserId}`);
                if (response.ok) {
                    const profile = await response.json();
                    if (profile && Object.keys(profile).length > 0) {
                        localStorage.setItem('user_profile_cache', JSON.stringify(profile));
                    }
                }
            } catch (err) {
                console.error("プロフィール読み込み失敗:", err);
            }
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            const year = currentCalendarYear;
            const month = currentCalendarMonth;
            
            document.getElementById('calendar-month-title').innerText = `${year}年 ${month + 1}月`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            
            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'h-14 lg:h-20';
                grid.appendChild(empty);
            }
            
            for (let d = 1; d <= lastDate; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isAvailable = calendarData[dateStr];
                
                if (isAvailable) {
                    const btn = document.createElement('button');
                    btn.className = 'h-14 lg:h-20 bg-white border-2 lg:border-3 border-primary text-black font-bold flex items-center justify-center rounded lg:rounded-lg shadow-sm hover:bg-yellow-50 lg:text-2xl transition-colors';
                    btn.innerText = d;
                    btn.onclick = () => selectDate(dateStr);
                    grid.appendChild(btn);
                } else {
                    const div = document.createElement('div');
                    div.className = 'h-14 lg:h-20 bg-gray-100 text-gray-400 flex items-center justify-center rounded lg:rounded-lg lg:text-2xl';
                    div.innerText = d;
                    grid.appendChild(div);
                }
            }
        }

        function changeMonth(delta) {
            currentCalendarMonth += delta;
            if (currentCalendarMonth > 11) {
                currentCalendarMonth = 0;
                currentCalendarYear++;
            } else if (currentCalendarMonth < 0) {
                currentCalendarMonth = 11;
                currentCalendarYear--;
            }
            loadCalendarData(getCurrentMonthString());
        }

        function renderTourList(dateStr) {
            const container = document.getElementById('tour-list');
            container.innerHTML = '';
            
            const tours = Object.values(toursData);
            
            if (tours.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-8">この日のツアーはありません</div>';
                return;
            }
            
            tours.forEach(tour => {
                const card = document.createElement('div');
                card.className = 'border rounded-xl overflow-hidden shadow-md lg:shadow-lg';
                
                const isWaitlistOpen = tour.status === 'waitlist_open';
                const isFull = tour.remainingSeats <= 0 || tour.status === 'full';
                const statusBadge = isWaitlistOpen
                    ? '<span class="absolute top-2 right-2 lg:top-4 lg:right-4 bg-orange-500 text-white px-2 py-1 lg:px-4 lg:py-2 rounded text-sm lg:text-lg font-bold">キャンセル待ち受付中</span>'
                    : (isFull 
                        ? '<span class="absolute top-2 right-2 lg:top-4 lg:right-4 bg-red-500 text-white px-2 py-1 lg:px-4 lg:py-2 rounded text-sm lg:text-lg font-bold">満席</span>' 
                        : '');
                
                const escapedTitle = tour.title.replace(/'/g, "\\'");

                let actionButton;
                if (isWaitlistOpen && tour.waitlist_available) {
                    actionButton = `<button onclick="selectTourWaitlist('${tour.id}', '${escapedTitle}', ${tour.price})" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-6 lg:py-4 lg:px-8 rounded-lg text-base lg:text-lg shadow-md border-b-4 border-orange-700 active:border-b-0 active:translate-y-1 transition-colors">キャンセル待ち予約</button>`;
                } else if (isWaitlistOpen && !tour.waitlist_available) {
                    actionButton = '<span class="bg-gray-300 text-gray-500 font-bold py-3 px-6 lg:py-4 lg:px-8 rounded-lg text-base lg:text-lg">キャンセル待ち満員</span>';
                } else if (isFull) {
                    actionButton = '<span class="bg-gray-300 text-gray-500 font-bold py-3 px-8 lg:py-4 lg:px-10 rounded-lg text-lg lg:text-xl">満席</span>';
                } else {
                    actionButton = `<button onclick="selectTour('${tour.id}', '${escapedTitle}', ${tour.price})" class="bg-primary hover:bg-primary-hover text-black font-bold py-3 px-8 lg:py-4 lg:px-10 rounded-lg text-lg lg:text-xl shadow-md border-b-4 border-yellow-500 active:border-b-0 active:translate-y-1 transition-colors">選択する</button>`;
                }
                
                card.innerHTML = `
                    <div class="relative">
                        ${tour.imageUrl 
                            ? `<img src="${tour.imageUrl}" alt="${tour.title}" class="w-full h-48 lg:h-64 object-cover">` 
                            : '<div class="bg-gray-300 h-48 lg:h-64 w-full flex items-center justify-center text-gray-500 font-bold lg:text-xl">ツアー画像</div>'}
                        ${statusBadge}
                    </div>
                    <div class="p-4 lg:p-6">
                        <h3 class="text-xl lg:text-2xl font-bold mb-2 lg:mb-3">${tour.title}</h3>
                        <p class="text-gray-700 mb-2 lg:mb-3 text-lg lg:text-xl">${tour.description || ''}</p>
                        <p class="text-sm lg:text-lg text-gray-500 mb-4 lg:mb-6">${isWaitlistOpen ? 'キャンセル待ち ' + tour.waitlist_count + '/' + tour.waitlist_max + '名' : (isFull ? '' : '残り ' + tour.remainingSeats + '席')}</p>
                        <div class="flex justify-between items-end">
                            <span class="text-2xl lg:text-3xl font-bold">¥${tour.price.toLocaleString()}</span>
                            ${actionButton}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function goTo(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            window.scrollTo(0, 0);
        }

        async function selectDate(dateStr) {
            cache.date = dateStr;
            const [y, m, d] = dateStr.split('-');
            document.getElementById('view-date-title').innerText = `${parseInt(m)}月${parseInt(d)}日のツアー`;
            
            document.getElementById('tour-list').innerHTML = '<div class="text-center text-gray-400 py-8">読み込み中...</div>';
            goTo('screen-b02');
            await loadToursForDate(dateStr);

                                    <p class="font-bold text-base">${data.name || "---"}</p>
                                </div>
                            </div>
                            <div class="border-t border-gray-200"></div>
                            <div class="flex items-start gap-3">
                                <span class="text-gray-400 text-lg">📞</span>
                                <div class="flex-1">

                if (e.target === modal) {

            document.body.appendChild(modal);

        function closeAutoFillDialog() {
            const modal = document.getElementById('auto-fill-modal');
            if (modal) {
                const content = modal.querySelector('.popup-content');
                if (content) {
                    content.classList.add('popup-closing');
                    setTimeout(() => modal.remove(), 200);
                } else {
                    modal.remove();
                }
            }
        }

            document.getElementById('input-phone').value = data.phone || "";
            document.getElementById('input-email').value = data.email || "";
            document.getElementById('input-zip').value = data.zip || "";
            document.getElementById('input-pref').value = data.pref || "";
            document.getElementById('input-city').value = data.city || "";
            document.getElementById('input-street').value = data.street || "";

        function setupPickupScreen() {
            document.getElementById('pickup-count-label').innerText = `参加人数：${cache.passengers}名`;
            
            const modeSelector = document.getElementById('pickup-mode-selector');
            
            // 2名以上の場合は選択肢を表示
            if (cache.passengers >= 2) {
                modeSelector.classList.remove('hidden');
                modeSelector.classList.add('flex');
            } else {
                modeSelector.classList.add('hidden');
                modeSelector.classList.remove('flex');
            }
            
            // デフォルトは「全員同じ」
            document.querySelector('input[name="pickup_mode"][value="same"]').checked = true;
            
            renderPickupDropdowns();
        }

        function renderPickupDropdowns() {
            const area = document.getElementById('pickup-dropdowns-area');
            area.innerHTML = '';
            
            const mode = document.querySelector('input[name="pickup_mode"]:checked').value;
            const count = (mode === 'individual') ? cache.passengers : 1;
            
            // 選択中のツアーに対応する乗車地を取得（sortOrderでソート）
            const tour = toursData[cache.tourId];
            const availablePickupIds = tour?.pickupIds || [];
            
            // pickupIdsが設定されていればフィルタ、なければ全て表示
            let availablePickups;
            if (availablePickupIds.length > 0) {
                availablePickups = PICKUP_OPTIONS
                    .filter(p => availablePickupIds.includes(p.id))
                    .sort((a, b) => a.sortOrder - b.sortOrder);
            } else {
                availablePickups = [...PICKUP_OPTIONS].sort((a, b) => a.sortOrder - b.sortOrder);
            }
            
            for (let i = 0; i < count; i++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'mb-4';
                
                const label = document.createElement('label');
                label.className = "block text-lg lg:text-2xl font-bold mb-2 lg:mb-3";
                label.innerText = (count === 1) ? "乗車場所を選択" : `${i + 1}人目の乗車場所`;
                wrapper.appendChild(label);

                const select = document.createElement('select');
                select.className = "pickup-select w-full border-2 border-gray-300 p-3 lg:p-4 rounded-lg bg-white text-lg lg:text-2xl h-14 lg:h-16";
                
                availablePickups.forEach(pickup => {
                    const option = document.createElement('option');
                    option.value = pickup.name;
                    option.innerText = pickup.name;
                    select.appendChild(option);
                });

                wrapper.appendChild(select);
                area.appendChild(wrapper);
            }
        }

            cache.pickups = Array.from(selects).map(s => s.value);
            
            setupConfirmScreen();
            goTo('screen-b05');
        }

        function setupConfirmScreen() {
            document.getElementById('conf-tour').innerText = cache.tourTitle;
            document.getElementById('conf-date').innerText = formatDateJP(cache.date);
            document.getElementById('conf-name').innerText = cache.userInfo.name + " 様";
            document.getElementById('conf-phone').innerText = cache.userInfo.phone;
            const address = (cache.userInfo.pref || '') + (cache.userInfo.city || '') + (cache.userInfo.street || '');
            document.getElementById('conf-address').innerText = address || '未入力';
            document.getElementById('conf-passengers').innerText = cache.passengers + "名";

            // キャンセル待ちバナー表示
            const waitlistBanner = document.getElementById('conf-waitlist-banner');
            if (waitlistBanner) waitlistBanner.remove();
            if (cache.isWaitlist) {
                const banner = document.createElement('div');
                banner.id = 'conf-waitlist-banner';
                banner.className = 'bg-orange-50 border-2 border-orange-300 p-4 rounded-xl mb-4 text-center';
                banner.innerHTML = '<p class="text-orange-700 font-bold text-lg">⚠️ キャンセル待ち予約です</p><p class="text-orange-600 text-sm mt-1">キャンセルが出た場合にご予約が確定します</p>';
                const confBox = document.getElementById('conf-tour').closest('.bg-gray-50');
                confBox.parentNode.insertBefore(banner, confBox);
            }

            // ボタンテキスト変更
            const confirmBtn = document.getElementById('btn-confirm-reservation');
            if (cache.isWaitlist) {
                confirmBtn.innerText = 'キャンセル待ちで予約する';
                confirmBtn.className = 'w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 lg:py-6 rounded-xl text-2xl lg:text-3xl shadow-lg border-b-4 border-orange-700 active:border-b-0 active:translate-y-1 transition-colors';
            } else {
                confirmBtn.innerText = '予約を確定する';
                confirmBtn.className = 'w-full bg-primary hover:bg-primary-hover text-black font-bold py-4 lg:py-6 rounded-xl text-2xl lg:text-3xl shadow-lg border-b-4 border-yellow-500 active:border-b-0 active:translate-y-1 transition-colors';
            }
            
            const baseTour = cache.pricePerPerson * cache.passengers;
            const seatUpchargeCount = cache.preferredSeats.filter(s => s).length;
            const seatUpcharge = seatUpchargeCount * PREFERRED_SEAT_PRICE;
            const total = baseTour + seatUpcharge;
            
            document.getElementById('conf-base-price').innerText = "¥" + baseTour.toLocaleString();
            document.getElementById('conf-seat-price').innerText = "¥" + seatUpcharge.toLocaleString();
            document.getElementById('conf-total').innerText = "¥" + total.toLocaleString();

            const pickupContainer = document.getElementById('conf-pickups');
            pickupContainer.innerHTML = '';
            
            // 乗車場所の表示（全員同じ or 個別）
            if (cache.pickups.length === 1 || cache.pickups.every(p => p === cache.pickups[0])) {
                pickupContainer.innerText = cache.pickups[0];
            } else {
                cache.pickups.forEach((pickup, idx) => {
                    const p = document.createElement('p');
                    p.innerText = `${idx + 1}人目：${pickup}`;
                    pickupContainer.appendChild(p);
                });
            }

            const seatContainer = document.getElementById('conf-seats');
            seatContainer.innerHTML = '';
            const hasSeat = cache.preferredSeats.some(s => s);
            seatContainer.innerText = hasSeat ? "指定あり" : "指定なし";
        }

        // ---------------------------------
        // B-06 完了画面を動的に生成
        // ---------------------------------
        function createCompletionScreen() {
            // 既存のB-06画面があれば削除
            const existing = document.getElementById('screen-b06');
            if (existing) {
                existing.remove();
            }
            
            const isWaitlist = cache.isWaitlist;
            const icon = isWaitlist ? '⏳' : '✅';
            const heading = isWaitlist ? 'キャンセル待ちを受け付けました' : '予約を受け付けました';
            const waitlistNote = isWaitlist 
                ? `<div class="bg-orange-50 border-2 border-orange-200 p-4 rounded-xl mb-4">
                    <p class="text-orange-700 font-bold">⚠️ キャンセル待ち予約です</p>
                    <p class="text-orange-600 text-sm mt-1">キャンセルが発生した場合、担当者からご連絡いたします。</p>
                   </div>` 
                : '';
            
            // 新しいB-06画面を作成
            const screen = document.createElement('div');
            screen.id = 'screen-b06';
            screen.className = 'screen p-8 text-center flex flex-col justify-center min-h-[60vh]';
            screen.innerHTML = `
                <div class="text-6xl mb-6">${icon}</div>
                <h2 class="text-2xl font-bold mb-8">${heading}</h2>
                
                ${waitlistNote}

                <div class="bg-blue-50 border-2 border-blue-100 p-6 rounded-xl text-left w-full mb-6 space-y-4">
                    <p class="text-base leading-relaxed">
                        弊社が確認後、LINEにて、予約確定通知をお送りいたします。担当者からの連絡をお待ちください。
                    </p>
                    <p class="text-base leading-relaxed">
                        2営業日（土日祝休）を経過してもご連絡がない場合は、お申込みが届いていない可能性がございます。その際はお手数ですがご一報ください。
                    </p>
                    <p class="text-base leading-relaxed">
                        乗車地「六之本・米原・彦根」は他のお客様を含めて5名以上のお申込みがない場合、変更をお願いする場合がございます。
                    </p>
                    <p class="text-base leading-relaxed font-bold text-red-600">
                        キャンセルは公式LINEからご連絡ください。
                    </p>
                </div>

                <p class="text-xl font-bold text-gray-800">
                    この画面は閉じても大丈夫です。
                </p>
            `;
            
            // DOMに追加（screen-b05の親要素を取得）
            const container = document.getElementById('screen-b05').parentElement;
            container.appendChild(screen);
        }

        async function ensureLineUserIdOrToken() {
            // 1. すでにuserIdがあればOK
            if (cache.lineUserId) {
                return { userId: cache.lineUserId, accessToken: liffAccessToken || '' };
            }

            // 2. LIFFが初期化済みで、アクセストークンがあれば送る（サーバー側でuserId解決）
            if (liffAccessToken) {
                return { userId: '', accessToken: liffAccessToken };
            }

            // 3. LIFFがまだ初期化されていない場合、再試行
            try {
                if (typeof window.liff !== 'undefined') {
                    if (!liff.isLoggedIn()) {
                        liff.login();
                        return null;
                    }
                    // ログイン済みならトークン取得
                    liffAccessToken = liff.getAccessToken();
                    if (liffAccessToken) {
                        return { userId: '', accessToken: liffAccessToken };
                    }
                }
            } catch (e) {
                console.error('LINE認証情報取得失敗:', e);
            }

            return null;
        }

        async function submitReservation() {
            if (cache.isSubmitting) {
                alert("送信中です。お待ちください...");
                return;
            }

            cache.isSubmitting = true;
            const btn = document.getElementById('btn-confirm-reservation');
            btn.disabled = true;
            btn.innerText = "読み込み中…";

            try {
                const lineInfo = await ensureLineUserIdOrToken();
                if (!lineInfo) {
                    const state = {
                        liffReady,
                        hasUserId: !!cache.lineUserId,
                        hasToken: !!liffAccessToken,
                        liffExists: typeof window.liff !== 'undefined',
                        isLoggedIn: typeof window.liff !== 'undefined' ? liff.isLoggedIn() : false,
                        debug: window._liffDebug || []
                    };
                    alert("LINE認証に失敗しました。お手数ですが、画面を閉じてもう一度お試しください。");
                    return;
                }

                const payload = {
                    lineUserId: lineInfo.userId || '',
                    liffAccessToken: lineInfo.accessToken || '',
                    date: cache.date,
                    tourId: cache.tourId,
                    tourTitle: cache.tourTitle,
                    pricePerPerson: cache.pricePerPerson,
                    userInfo: cache.userInfo,
                    passengers: cache.passengers,
                    pickups: cache.pickups,
                    preferredSeats: cache.preferredSeats,
                    consentAutoFill: document.getElementById('consent-next').checked
                };

                const response = await fetch(`${BOOKING_API_BASE}/reservations`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const data = await response.json();
                    console.log("Reservation success:", data);
                    createCompletionScreen();
                    goTo('screen-b06');
                } else {
                    const error = await response.json();
                    alert("予約の処理中にエラーが発生しました。しばらくしてからもう一度お試しください。");
                }
            } catch (err) {
                console.error("予約API通信エラー:", err);
                alert("通信エラーが発生しました。インターネット接続をご確認の上、もう一度お試しください。");
            } finally {
                cache.isSubmitting = false;
                btn.disabled = false;
                btn.innerText = "予約を確定する";
            }
        }
    </script>
</body>
</html>
