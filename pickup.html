<head>

    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --accent: #FACC15;
            --accent-dark: #ca9a04;
            --bg: #f4f5f7;
            --card: #ffffff;
            --text: #111827;
            --sub: #6b7280;
            --border: #e5e7eb;
            --pin: #EF4444;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
        }

        /* ── Header ── */
        header {
            background: #111827;
            padding: 18px 20px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-logo {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .header-logo svg {
            width: 20px;
            height: 20px;
            color: #111827;
        }

        header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            line-height: 1.3;
        }

        header p {
            font-size: 13px;
            color: #9ca3af;
            margin-top: 1px;
        }

        /* ── Lead ── */
        .lead {
            padding: 20px 20px 8px;
            max-width: 520px;
            margin: 0 auto;
        }

        .lead p {
            font-size: 16px;
            color: var(--sub);
            line-height: 1.7;
        }

        /* ── List ── */
        .list {
            padding: 8px 16px 40px;
            max-width: 520px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--card);
            border-radius: 14px;
            padding: 16px 16px;
            text-decoration: none;
            color: inherit;
            border: 1px solid var(--border);
            box-shadow: 0 1px 3px rgba(0,0,0,.06);
            transition: box-shadow .15s, transform .1s;
            -webkit-tap-highlight-color: transparent;
        }

        .card:active {
            transform: scale(0.97);
            box-shadow: none;
        }

        /* 左のアクセントバー */
        .card::before {
            content: '';
            width: 3px;
            height: 36px;
            background: var(--accent);
            border-radius: 2px;
            flex-shrink: 0;
        }

        .card-body {
            flex: 1;
            min-width: 0;
        }

        .card-name {
            font-size: 19px;
            font-weight: 700;
            color: var(--text);
        }

        .card-sub {
            font-size: 14px;
            color: var(--sub);
            margin-top: 2px;
        }

        /* 右の地図アイコン */
        .card-icon {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            background: #fef9ec;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-icon svg {
            width: 18px;
            height: 18px;
            color: var(--pin);
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            font-size: 13px;
            color: #9ca3af;
            padding-bottom: 32px;
        }
    </style>
</head>
